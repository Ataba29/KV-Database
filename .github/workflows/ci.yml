name: KV-DB CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t kv-db .

      - name: Run tests inside container
        run: docker run --rm kv-db ctest --output-on-failure
